<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account — Satchel & Co.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<link rel="stylesheet" href="/css/login.css">
</head>
<body>

<header class="site-header">
  <nav class="nav">
    <a href="/" class="logo">Satchel <em>& Co.</em></a>
    <ul class="nav-links">
      <li><a href="/">Home</a></li>
      <li><a href="/#collection">Collection</a></li>
    </ul>
    <div class="nav-right">
      <a href="/login.html" class="cart-link">Login</a>
      <a href="/cart.html" class="cart-link">Bag <span class="cart-count">0</span></a>
    </div>
  </nav>
</header>

<div class="auth-wrap">
  <h1>Create Account</h1>
  <span class="auth-sub">Join to track orders and save your favorite styles.</span>

  <form id="register-form">
    <div class="field">
      <label for="name">Full Name</label>
      <input type="text" id="name" required placeholder="Jane Doe">
    </div>
    <div class="field">
      <label for="reg-email">Email</label>
      <input type="email" id="reg-email" required placeholder="you@example.com">
    </div>
    <div class="field">
      <label for="reg-password">Password</label>
      <input type="password" id="reg-password" required placeholder="••••••••">
    </div>
    <button type="submit" class="btn btn-primary btn-block">Create Account</button>
  </form>

  <div class="auth-foot">
    Already have an account? <a href="/login.html">Login</a>
  </div>
</div>

<script src="/js/script.js"></script>
<script src="/js/register.js"></script>
</body>
</html>
