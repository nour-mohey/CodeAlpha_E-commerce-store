<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Satchel & Co.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/login.css">
</head>
<body>

<header class="site-header">
  <nav class="nav">
    <a href="index.html" class="logo">Satchel <em>& Co.</em></a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="index.html#collection">Collection</a></li>
      <li><a href="index.html#craft">Craft</a></li>
    </ul>
    <div class="nav-right">
      <a href="login.html" class="cart-link active">Login</a>
      <a href="cart.html" class="cart-link">Bag <span class="cart-count">0</span></a>
    </div>
  </nav>
</header>

<div class="auth-wrap">
  <h1>Welcome Back</h1>
  <span class="auth-sub">Sign in to view your orders and saved bags.</span>

  <form id="login-form">
    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" required placeholder="you@example.com">
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" required placeholder="••••••••">
    </div>
    <button type="submit" class="btn btn-primary btn-block">Login</button>
  </form>

  <div class="auth-foot">
    Don't have an account? <a href="register.html">Create one</a>
  </div>
</div>

<script src="../js/script.js"></script>
<script src="../js/login.js"></script>
</body>
</html>
